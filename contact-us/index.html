<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Muddy River Leather</title>
  <meta name="description" content="Contact Muddy River Leather for custom projects and product questions.">
  <link rel="canonical" href="https://mrlgoods.com/contact-us/">
  <meta property="og:title" content="Contact Us | Muddy River Leather">
  <meta property="og:description" content="Get in touch with Muddy River Leather.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mrlgoods.com/contact-us/">
  <meta property="og:image" content="https://mrlgoods.com/assets/logo/muddy-river-leather.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="/assets/icons/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="/styles/main.css">
  <script defer src="/global-scripts/global.js"></script>
  <script defer src="/contact-us/scripts/contact.js"></script>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <header class="site-header" data-site-header>
    <div class="container site-header__inner">
      <a class="brand" href="/" aria-label="Muddy River Leather home"><img src="/assets/logo/muddy-river-leather.png" alt="Muddy River Leather logo" width="290" height="80"></a>
      <button class="nav-toggle" data-nav-toggle aria-expanded="false" aria-controls="site-nav" aria-label="Toggle menu"><span></span><span></span><span></span></button>
      <nav id="site-nav" class="site-nav" aria-label="Primary" data-site-nav>
        <a href="/">Home</a><a href="/products/">Products</a><a href="/about-us/">About Us</a><a href="/contact-us/" class="active">Contact Us</a>
      </nav>
    </div>
  </header>

  <main id="main-content" class="section">
    <div class="container" data-reveal>
      <h1>Custom Work & Questions</h1>
      <p>Tell us what you're looking for and we’ll get back to you.</p>
      <form id="contact-form" class="contact-form" action="/contact-us/scripts/contact-submit.php" method="post" novalidate>
        <label for="name">Name</label>
        <input id="name" name="name" type="text" required maxlength="100">

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required maxlength="180">

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required maxlength="2000"></textarea>

        <div class="honeypot" aria-hidden="true">
          <label for="company">Company</label>
          <input id="company" name="company" type="text" tabindex="-1" autocomplete="off">
        </div>

        <input type="hidden" name="form_started" id="form_started" value="">
        <button class="btn btn--primary" type="submit">Send Message</button>
        <p id="contact-feedback" class="notice" role="status" aria-live="polite"></p>
      </form>
    </div>
  </main>

  <footer class="site-footer"><p class="container site-footer__copy">© <span data-year></span> Muddy River Leather. All rights reserved.</p></footer>
</body>
</html>
